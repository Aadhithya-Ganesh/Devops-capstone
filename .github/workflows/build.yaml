name: docker

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker build and push
        env:
          TAG: ${{ github.sha }}
        run: |
          docker compose build
          docker compose push

      - name: Update image tag in manifests
        run: |
          sed -i "s|aadhithya123/frontend:.*|aadhithya123/frontend:${{ github.sha }}|g" kubernetes/frontend-deployment.yaml
          sed -i "s|aadhithya123/backend:.*|aadhithya123/backend:${{ github.sha }}|g" kubernetes/backend-deployment.yaml

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add kubernetes/frontend-deployment.yaml kubernetes/backend-deployment.yaml
          git commit -m "update image tags to ${{ github.sha }} [skip ci]"
          git push
