        io.kompose.service: frontend
    spec:
      containers:
        - image: aadhithya123/frontend:b93ae73b53a901b6f2af6ebef8aabc036acda641
          name: frontend
          ports:
            - containerPort: 80
              protocol: TCP
      restartPolicy: Always
